server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # --- Cache static assets ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Proxy API requests to backend ---
    location /api/ {
        # Necesitamos usar un resolver si pasamos a un nombre de dominio para que Nginx no crashee si cambian las IPs
        resolver 8.8.8.8;
        # Since resolving external domains dynamically might need a variable:
        set $backend "https://libertad-backend-925844147240.northamerica-south1.run.app";
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend;
        proxy_set_header Host libertad-backend-925844147240.northamerica-south1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;

        # Limit request body size (uploads)
        client_max_body_size 10m;
    }

    # --- Angular SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
